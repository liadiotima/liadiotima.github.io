<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lia Diotima | UGC Content Creator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-dark: #2e1a2b; /* Dunkles Lila - Haupttextfarbe */
            --primary-purple: #8e44ad;
            --soft-pink: #fce4ec;
            --vivid-pink: #d81b60; /* Akzentfarbe */
            --bg-color: #faf5f7;
            --white: #ffffff;
            --font-main: 'Montserrat', sans-serif;
            --font-display: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--primary-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 {
            font-family: var(--font-display);
            color: var(--primary-dark);
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }

        ul {
            list-style: none;
        }

        /* --- Layout Utilities --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .section-padding {
            padding: 6rem 0;
        }

        /* --- Navigation --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.2rem 0;
            z-index: 1000;
            background: rgba(250, 245, 247, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        .nav-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            font-family: var(--font-main);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--primary-dark);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--vivid-pink);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--vivid-pink);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* --- Hero Section --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at top right, #f8dce8, transparent 40%);
            overflow: hidden;
            padding-top: 80px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
            width: 100%;
        }

        .hero-content {
            position: relative;
            z-index: 5;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-dark);
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .hero-tagline {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 500px;
            font-weight: 300;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border: 1px solid var(--primary-dark);
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .social-btn:hover {
            background: var(--primary-dark);
            color: var(--white);
        }

        .hero-images {
            position: relative;
            height: 600px;
            width: 100%;
        }

        .hero-img {
            position: absolute;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(46, 26, 43, 0.15);
        }

        /* Bild-Positionierung */
        .img-2 {
            width: 320px;
            height: 450px;
            top: -30px;
            left: 10px;
            z-index: 1;
            background-color: #ddd; 
        }

        .img-3 {
            width: 280px;
            height: 380px;
            bottom: 0;
            right: 10px;
            z-index: 2;
            border: none;
            background-color: #ccc; 
        }

        /* --- About Section --- */
        .about {
            background-color: var(--white);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 5rem;
            align-items: center;
        }

        .about-img-container {
            position: relative;
            height: 600px;
            border-radius: 200px 200px 0 0;
            overflow: hidden;
        }

        .about-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-text h2 {
            font-size: 3rem;
            margin-bottom: 2rem;
            color: var(--primary-dark);
        }

        .about-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            color: var(--primary-dark);
            opacity: 0.85;
        }

        /* --- Brands Section --- */
        .brands {
            text-align: center;
            background-color: var(--soft-pink);
            padding: 4rem       if (e.target == modal) {
                closeModal();
            }
        });

    </script>
</body>
</html>
